<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vditor Markdown Editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      /* html/body 保持 overflow:hidden 防止页面滚动条 */
      html, body {
        height: 100%;
        overflow: hidden;
      }
      /* #root 必须 overflow:visible，否则 Vditor 工具栏子菜单(.vditor-panel)
         向上展开时会被裁剪——子菜单需要溢出 #root 的子元素(.app → .main-content) 边界 */
      #root {
        height: 100%;
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
